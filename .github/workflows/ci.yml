name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Format
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Expo dependency compatibility
        working-directory: apps/mobile
        run: pnpm exec expo install --check
      - name: Expo Doctor
        working-directory: apps/mobile
        run: pnpm dlx expo-doctor@1.20.1
      - name: Export Mobile Android
        run: pnpm --filter @deutschtrainer/mobile export:android
      - name: Export Mobile Web
        run: pnpm --filter @deutschtrainer/mobile export:web
      - name: Build Admin
        run: pnpm --filter @deutschtrainer/admin build
