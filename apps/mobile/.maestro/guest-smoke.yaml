appId: com.deutschtrainer.app
name: Offline demo learning smoke
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "德語 B1-C2 自學系統"
    timeout: 15000
- tapOn: "離線 Demo 試用"
- extendedWaitUntil:
    visible: "你好，Demo 學習者"
    timeout: 15000
- assertVisible: "離線 Demo：.*"
- tapOn: "課程"
- assertVisible: "德語能力路徑"
- assertVisible: "日常獨立溝通"
- tapOn: "查看 單元 1：在德語環境中處理日常事務"
- assertVisible: "單元 1：在德語環境中處理日常事務"
- tapOn: "開啟第 1 課 說明原因與讓步"
- assertVisible: "說明原因與讓步"
- tapOn: "開始或繼續課堂練習"
- extendedWaitUntil:
    visible: "連接詞單選"
    timeout: 15000
- tapOn: "weil"
- tapOn: "提交答案"
- assertVisible: "答對了"
- stopApp
- launchApp
- extendedWaitUntil:
    visible: "你好，Demo 學習者"
    timeout: 15000
